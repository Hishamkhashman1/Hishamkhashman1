name: Refresh README stats

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Update cache-buster in README
        run: |
          TS=$(date +%s)
          sed -i "s/v=AUTO_REFRESH/v=$TS/g" README.md || true
          sed -i "s/v=[0-9]\+/v=$TS/g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: refresh README stats cache"

      - name: Push changes
        run: |
          git push
